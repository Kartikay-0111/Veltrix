syntax = "proto3";
package telemetry;

option go_package = "veltrix/telemetry-ingester/internal/pb";

// ─── Event Type 1: Intent ────────────────────────────────────────────────────
// Generated by the C++ bot BEFORE sending the HTTP request to the contestant's
// exchange server. The Shadow Engine replays these to build its reference book.
message OrderSubmitted {
  int64  timestamp_us     = 1;  // Bot's local clock, epoch microseconds
  string submission_id    = 2;
  int32  bot_id           = 3;
  string order_id         = 4;  // Bot-generated ID (e.g. "24-1")
  string action           = 5;  // LIMIT | MARKET | CANCEL | FOK | FAK | GFD
  string side             = 6;  // BUY | SELL (empty for CANCEL)
  string ticker           = 7;
  double price            = 8;
  int32  quantity         = 9;
  uint64 cancel_target_id = 10; // For CANCEL: server-assigned ID being cancelled
}

// ─── Event Type 2: Observation ───────────────────────────────────────────────
// Generated by parsing the HTTP response from the contestant's server.
// One message per individual trade match (unrolled from the trades[] array).
// The Shadow Engine diffs these against its own predicted matches.
message TradeExecuted {
  int64  timestamp_us        = 1;  // Bot's clock upon receiving response
  string submission_id       = 2;
  int32  bot_id              = 3;
  uint64 contestant_order_id = 4;  // Server-assigned order ID for the new order
  uint64 matched_order_id    = 5;  // The resting order that was matched against
  double execution_price     = 6;
  int32  execution_quantity  = 7;
  string ticker              = 8;
  string aggressor_order_id  = 9;  // Bot-generated order_id of the aggressing order
                                   // (the intent that produced this fill). This is the
                                   // join key the Shadow Engine uses to tie a fill back
                                   // to its OrderSubmitted intent — bot-assigned, so the
                                   // contestant server can neither forge nor evade it.
}

// ─── Metrics ─────────────────────────────────────────────────────────────────
// Same schema as the existing telemetry counters, binary-encoded instead of JSON.
message MetricsBatch {
  int64  timestamp_ms   = 1;
  string submission_id  = 2;
  int32  thread_id      = 3;
  int64  http_200       = 4;
  int64  http_4xx       = 5;
  int64  http_5xx       = 6;
  int64  timeout        = 7;
  int64  econnref       = 8;
  int64  other_err      = 9;
  double avg_latency_ms = 10;
  int64  samples        = 11;
  repeated int64 histogram = 12;
}

// ─── The 500ms flush batch from one C++ thread ───────────────────────────────
// Contains the full audit log (orders + trades) and aggregated metrics for one
// flush window. Sent as a single gzip-compressed protobuf message over the wire.
message AuditBatch {
  repeated OrderSubmitted orders  = 1;
  repeated TradeExecuted  trades  = 2;
  MetricsBatch            metrics = 3;
}

// ─── gRPC Service ────────────────────────────────────────────────────────────
service TelemetryService {
  // Client-side streaming: C++ sends a stream of AuditBatch messages
  // (one every 500ms per thread). Go acks once when the stream ends.
  rpc StreamTelemetry (stream AuditBatch) returns (StreamTelemetryResponse);
}

message StreamTelemetryResponse {
  int64  batches_received = 1;
  string status           = 2;
}
