# docker-compose.yml
networks:
  backend:
    name: backend
    driver: bridge
  sandbox-net:   
    name: sandbox-net       # isolated network for contestant containers
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  redpanda_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/leaderboard_metrics.sql:/docker-entrypoint-initdb.d/02_metrics.sql
    ports:
      - "5432:5432"
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    networks: [backend]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5
    # ── Redpanda (Kafka-compatible message bus) ────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    restart: always
    command:
      - redpanda
      - start
      - --smp=1                          # 1 CPU core for local dev
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082  # HTTP proxy for debugging
    volumes: [redpanda_data:/var/lib/redpanda/data]
    ports:
      - "9092:9092"   # Kafka API (used by bot fleet producer)
      - "8082:8082"   # Pandaproxy (HTTP → produce/consume for debugging)
      - "9644:9644"   # Admin API
    networks: [backend]
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      retries: 5
 
  # Create the order_metrics topic on startup
  redpanda-init:
    image: redpandadata/redpanda:latest
    depends_on:
      redpanda: { condition: service_healthy }
    entrypoint: ["bash", "-lc", "rpk topic create order_metrics --brokers redpanda:9092 --partitions 6 --replicas 1 || true; rpk topic create order_events --brokers redpanda:9092 --partitions 6 --replicas 1 || true"]
    networks: [backend] 
  # ── Your Services ────────────────────────────────────────────────
  submission-service:
    build: ./submission-service
    restart: always
    env_file: .env
    ports:
      - "8080:8080"
    networks: [backend]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_healthy }

  telemetry-ingester:
    build:
      context: .
      dockerfile: ./telemetry-ingester/Dockerfile
    restart: always
    env_file: .env
    environment:
      REDPANDA_BROKERS: redpanda:9092
      ORDER_EVENTS_TOPIC: order_events
      ORDER_METRICS_TOPIC: order_metrics
      GRPC_PORT: 8091
      HTTP_PORT: 8090
    ports:
      - "8090:8090"
      - "8091:8091"
    networks: [backend]
    depends_on:
      redpanda: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      retries: 5

  sandbox-manager:
    build: ./sandbox-manager
    restart: always
    env_file: .env
    environment:
      FLEET_COMMANDER_URL: http://bot-fleet:7070
      DEFAULT_NUM_BOTS: 100
      DEFAULT_DURATION_SECS: 60
      SANDBOX_MANAGER_HEALTH_PORT: 8081
      PYTHONUNBUFFERED : 1
      SANDBOX_HOST: host.docker.internal
    ports:
      - "8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # needs Docker access
    networks:
      - backend
      - sandbox-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      bot-fleet: { condition: service_started }

  bot-fleet:
    build:
      context: .
      dockerfile: ./bot-fleet/Dockerfile
    restart: always
    environment:
      FLEET_LISTEN_PORT: 7070
      TELEMETRY_GRPC_TARGET: telemetry-ingester:8091
    ports:
      - "7070:7070"   # FleetCommander HTTP trigger endpoint
    networks: [backend, sandbox-net]
    depends_on:
      telemetry-ingester: { condition: service_healthy }
    # io_uring requires these kernel capabilities
    cap_add:
      - SYS_NICE       # for CPU pinning (pthread_setaffinity_np)
    security_opt:
      - seccomp=unconfined      # Disables Docker's filter, allowing io_uring system calls
    ulimits:
      memlock:
        soft: -1                # Allows io_uring to lock unlimited memory in RAM
        hard: -1
      nofile:
        soft: 65536             # Allows the bots to open 65,000 concurrent sockets
        hard: 65536   # allow 65k open file descriptors (one per bot socket)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  artifact-checker:
    build: ./artifact-checker-go
    restart: always
    environment:
      REDPANDA_BROKERS:  redpanda:9092
      ORDER_EVENTS_TOPIC: order_events
      METRICS_TOPIC:     order_metrics
      CONSUMER_GROUP:    artifact-checker
      ALLOWED_LATENESS_MS: 2000
      ARTIFACT_CHECKER_GOMAXPROCS: 1
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      SANDBOX_HOST:      ${ARTIFACT_SANDBOX_HOST:-sandbox-manager}   # set to sandbox-<submission_id>
      SANDBOX_PORT:      ${ARTIFACT_SANDBOX_PORT:-9999}
      HEALTH_PORT:       8092
    ports:
      - "8092:8092"
    cpuset: "7"                            # pin to CPU core 7 (hardware isolation)
    networks: [backend, sandbox-net]
    depends_on:
      redpanda:  { condition: service_healthy }
      postgres:  { condition: service_healthy }
      redis:     { condition: service_healthy }

  leaderboard-service:
    build: ./leaderboard-service
    restart: always
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST:        redis
      REDIS_PORT:        6379
      PORT:              8085
    ports:
      - "8085:8085"
    networks: [backend]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
